<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مصطفى وأسماء - اهربوا من الكلب!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:radial-gradient(ellipse at top,#0a0720,#1e1a4a,#16133a);
  font-family:'Tajawal',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;color:#fff;user-select:none;
}
#title{
  font-size:1.7rem;font-weight:900;color:#FFD700;
  text-shadow:0 0 20px #ff9500,0 2px 0 #6b3d00;
  margin-bottom:8px;letter-spacing:1px;
}
#hud{
  display:flex;gap:20px;margin-bottom:8px;
  background:rgba(0,0,0,0.6);padding:7px 22px;
  border-radius:50px;border:2px solid rgba(255,215,0,0.3);
}
.hi{font-size:.95rem;font-weight:700;color:#FFD700;}
#gw{
  position:relative;border-radius:16px;overflow:hidden;
  box-shadow:0 0 60px rgba(255,149,0,.3),0 0 120px rgba(30,26,74,.5);
  border:3px solid rgba(255,215,0,.3);
}
canvas{display:block;}
#ov{
  position:absolute;inset:0;
  background:linear-gradient(155deg,rgba(10,7,32,.97),rgba(30,26,74,.97));
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;
}
.oe{font-size:3.2rem;animation:bob .75s ease-in-out infinite alternate;}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.ot{font-size:2rem;font-weight:900;color:#FFD700;text-shadow:0 0 22px #ff9500;text-align:center;}
.os{font-size:.95rem;color:rgba(255,255,255,.75);text-align:center;line-height:2.1;max-width:360px;}
.pb{
  background:linear-gradient(135deg,#ff6b00,#FFD700);border:none;border-radius:50px;
  padding:12px 44px;font-family:'Tajawal',sans-serif;font-size:1.25rem;font-weight:900;
  color:#1a0a2e;cursor:pointer;box-shadow:0 5px 20px rgba(255,107,0,.4);
  transition:all .15s;margin-top:4px;
}
.pb:hover{transform:scale(1.07);box-shadow:0 7px 30px rgba(255,215,0,.5);}
.pb:active{transform:scale(.97);}
.ch{font-size:.78rem;color:rgba(255,255,255,.5);display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.ch span{background:rgba(255,255,255,.1);padding:3px 9px;border-radius:20px;}
</style>
</head>
<body>
<div id="title">🐾 مصطفى وأسماء يجريوا! 🐾</div>
<div id="hud">
  <div class="hi">⭐ <span id="sc">0</span></div>
  <div class="hi">💰 <span id="mo">0</span></div>
  <div class="hi">🏆 <span id="hi">0</span></div>
  <div class="hi">❤️ <span id="lv">❤️❤️❤️</span></div>
</div>
<div id="gw">
  <canvas id="c"></canvas>
  <div id="ov">
    <div class="oe">🐕</div>
    <div class="ot">اهربوا من الكلب!</div>
    <div class="os">مصطفى وأسماء محتاجين مساعدتك 😱<br>كلب شرير بيجري وراهم!<br>انطوا فوق الحواجز واجمعوا الفلوس 🏃‍♂️💨</div>
    <button class="pb" onclick="startGame()">▶ العب دلوقتي!</button>
    <div class="ch"><span>⬆ سهم لفوق</span><span>SPACE = نطة</span><span>👆 اضغط الشاشة</span></div>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

// ── Responsive sizing ──────────────────────────────
function setSize(){
  const mw=Math.min(window.innerWidth-12,860);
  const mh=Math.min(window.innerHeight-145,360);
  canvas.width=mw; canvas.height=mh;
}
setSize();
window.addEventListener('resize',()=>{setSize();if(!running){draw();}});

const W=()=>canvas.width, H=()=>canvas.height;
const GZ=65;           // ground zone height in px
const GY=()=>H()-GZ;  // y of ground line

// ── Helpers ────────────────────────────────────────
function lc(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;
}
function rr(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();}
function circ(x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}

// ── State ──────────────────────────────────────────
let score,money,hiScore=0,lives,frame,running,spd;
let obs,coins,parts,ftexts,clouds,bgX,stimer,nobs,ncoin,hcd,flash;
let loveTimer,loveMsg;
const LOVE_MSGS=['بحبك يا مصطفى 💖','أنت حياتي 💕','ماشيين سوا 💑','أنا جنبك دايماً 🌸','هروب رومانسي 😂💘'];

// ── Character defs ──────────────────────────────────
const CDEFS=[
  {id:'m',lbl:'مصطفى',frac:.10,skin:'#F5C578',shirt:'#1E40AF',pants:'#1e3055',hair:'#180800',shoes:'#1a1a1a',isGirl:false},
  {id:'a',lbl:'أسماء', frac:.19,skin:'#F8D8A0',abaya:'#2d1f5e',hijab:'#7c3aed',shoes:'#2a2a2a',isGirl:true}
];
let chars;

function makeChar(d){
  return{...d,x:W()*d.frac,y:GY(),vy:0,onG:true,scared:0};
}

// ── Dog ────────────────────────────────────────────
let dog;
function makeDog(){return{x:-200,y:GY(),f:0};}

// ══════════════════════════════════════════════════
//  DRAW MOSTAFA
// ══════════════════════════════════════════════════
function drawMostafa(p,t){
  const x=p.x, y=p.y;
  const run=Math.sin(t*.30);
  const ls=run*22, as=-run*16;
  const sOff=p.scared>0?Math.sin(p.scared*.6)*3:0;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();
  ctx.ellipse(x,y+3,17,5,0,0,Math.PI*2);ctx.fill();

  ctx.lineCap='round';ctx.lineJoin='round';

  // Back leg + shoe
  ctx.strokeStyle=p.pants;ctx.lineWidth=10;
  ctx.beginPath();ctx.moveTo(x,y-26);ctx.lineTo(x-7+ls*.4,y+1);ctx.stroke();
  ctx.strokeStyle=p.shoes;ctx.lineWidth=7;
  ctx.beginPath();ctx.moveTo(x-7+ls*.4,y+1);ctx.lineTo(x-15+ls*.4,y+2);ctx.stroke();
  // Shoe highlight
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x-9+ls*.4,y+1);ctx.lineTo(x-14+ls*.4,y+1.5);ctx.stroke();

  // Front leg + shoe
  ctx.strokeStyle=p.pants;ctx.lineWidth=10;
  ctx.beginPath();ctx.moveTo(x,y-26);ctx.lineTo(x+7-ls*.4,y+1);ctx.stroke();
  ctx.strokeStyle=p.shoes;ctx.lineWidth=7;
  ctx.beginPath();ctx.moveTo(x+7-ls*.4,y+1);ctx.lineTo(x+15-ls*.4,y+2);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x+9-ls*.4,y+1);ctx.lineTo(x+14-ls*.4,y+1.5);ctx.stroke();

  // Body
  ctx.fillStyle=p.shirt;
  ctx.beginPath();ctx.roundRect(x-15,y-58,30,33,[9,9,5,5]);ctx.fill();
  // Shirt shine
  ctx.fillStyle='rgba(255,255,255,.14)';
  ctx.beginPath();ctx.roundRect(x-14,y-57,28,13,[8,8,0,0]);ctx.fill();
  // Collar V
  ctx.fillStyle=lc(p.shirt,45);
  ctx.beginPath();ctx.moveTo(x-7,y-58);ctx.lineTo(x,y-50);ctx.lineTo(x+7,y-58);ctx.closePath();ctx.fill();
  // Button
  ctx.fillStyle='rgba(255,255,255,.4)';
  circ(x,y-45,2);circ(x,y-38,2);

  // Back arm
  ctx.strokeStyle=p.skin;ctx.lineWidth=9;
  ctx.beginPath();ctx.moveTo(x-12,y-52);ctx.quadraticCurveTo(x-25,y-40+as,x-23,y-28+as);ctx.stroke();
  // Front arm
  ctx.beginPath();ctx.moveTo(x+12,y-52);ctx.quadraticCurveTo(x+25,y-40-as,x+23,y-28-as);ctx.stroke();

  // Neck
  ctx.fillStyle=p.skin;ctx.fillRect(x-5,y-66,10,10);
  // Head
  ctx.fillStyle=p.skin;
  ctx.beginPath();ctx.ellipse(x+sOff,y-78,16,19,0,0,Math.PI*2);ctx.fill();
  // Head shading
  ctx.fillStyle='rgba(0,0,0,.07)';
  ctx.beginPath();ctx.ellipse(x+sOff+5,y-78,8,14,0.3,0,Math.PI*2);ctx.fill();

  // Hair
  ctx.fillStyle=p.hair;
  ctx.beginPath();ctx.ellipse(x+sOff,y-88,16,10,0,Math.PI,Math.PI*2);ctx.fill();
  // Spikes
  const hx=x+sOff;
  [-10,-5,0,5,10].forEach(dx=>{
    ctx.fillStyle=p.hair;
    ctx.beginPath();ctx.moveTo(hx+dx-3,y-88);ctx.lineTo(hx+dx,y-99);ctx.lineTo(hx+dx+4,y-90);ctx.closePath();ctx.fill();
  });

  // Face
  const fx=x+sOff, er=p.scared>0?4.2:2.8;
  // Whites
  ctx.fillStyle='white';
  ctx.beginPath();ctx.ellipse(fx-5.5,y-80,er*.75,er,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(fx+5.5,y-80,er*.75,er,0,0,Math.PI*2);ctx.fill();
  // Iris
  ctx.fillStyle=p.scared>0?'#c00':'#2244aa';
  ctx.beginPath();ctx.arc(fx-5.5,y-80,er*.6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(fx-5.5,y-80,er*.35,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(fx+5.5,y-80,er*.6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(fx+5.5,y-80,er*.35,0,Math.PI*2);ctx.fill();
  // Eye shine
  ctx.fillStyle='white';circ(fx-4.5,y-82,1.3);circ(fx+6.5,y-82,1.3);
  // Eyebrows
  ctx.strokeStyle=p.hair;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(fx-10,p.scared>0?y-87:y-85);ctx.lineTo(fx-2,p.scared>0?y-83:y-86);ctx.stroke();
  ctx.beginPath();ctx.moveTo(fx+10,p.scared>0?y-87:y-85);ctx.lineTo(fx+2,p.scared>0?y-83:y-86);ctx.stroke();
  // Mouth
  ctx.strokeStyle='#a0522d';ctx.lineWidth=2;
  ctx.beginPath();
  if(p.scared>0){ctx.arc(fx,y-73,4.5,0,Math.PI);}
  else{ctx.arc(fx,y-74,3.5,.2,Math.PI-.2);}
  ctx.stroke();
  // Blush
  ctx.fillStyle='rgba(255,110,110,.22)';
  ctx.beginPath();ctx.ellipse(fx-10,y-75,5,3,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(fx+10,y-75,5,3,0,0,Math.PI*2);ctx.fill();

  // Name tag
  const tw=56;
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.beginPath();ctx.roundRect(fx-tw/2,y-107,tw,19,9);ctx.fill();
  ctx.fillStyle='#FFD700';ctx.font='bold 12px Tajawal';ctx.textAlign='center';
  ctx.fillText(p.lbl,fx,y-94);
}

// ══════════════════════════════════════════════════
//  DRAW ASMAA (محجبة بعباية)
// ══════════════════════════════════════════════════
function drawAsmaa(p,t){
  const x=p.x, y=p.y;
  const run=Math.sin(t*.30+Math.PI);
  const ls=run*20, as=-run*14;
  const sOff=p.scared>0?Math.sin(p.scared*.6)*3:0;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();
  ctx.ellipse(x,y+3,18,5,0,0,Math.PI*2);ctx.fill();

  ctx.lineCap='round';ctx.lineJoin='round';

  // ── ABAYA (عباية) – wide flowing robe ──
  // Back flare of abaya while running
  const flare=Math.sin(t*.28)*6;
  ctx.fillStyle=p.abaya;
  // Main abaya body – wide trapezoid from waist to ground
  ctx.beginPath();
  ctx.moveTo(x-16,y-55); // waist left
  ctx.lineTo(x-22+flare,y+1);  // hem left (flows)
  ctx.lineTo(x+22-flare,y+1);  // hem right
  ctx.lineTo(x+16,y-55); // waist right
  ctx.closePath();ctx.fill();
  // Abaya sleeve back
  ctx.strokeStyle=p.abaya;ctx.lineWidth=13;
  ctx.beginPath();ctx.moveTo(x-13,y-52);ctx.quadraticCurveTo(x-28,y-40+as,x-26,y-28+as);ctx.stroke();
  // Abaya sleeve front
  ctx.beginPath();ctx.moveTo(x+13,y-52);ctx.quadraticCurveTo(x+28,y-40-as,x+26,y-28-as);ctx.stroke();
  // Abaya shine / fold lines
  ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x,y-50);ctx.lineTo(x-3+flare*.3,y+1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+6,y-50);ctx.lineTo(x+8-flare*.2,y+1);ctx.stroke();
  // Wrist showing (skin)
  ctx.strokeStyle=p.skin;ctx.lineWidth=7;
  ctx.beginPath();ctx.moveTo(x-24,y-32+as);ctx.lineTo(x-22,y-26+as);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+24,y-32-as);ctx.lineTo(x+22,y-26-as);ctx.stroke();

  // Legs barely visible under abaya (shoes peeping out)
  ctx.strokeStyle=p.shoes;ctx.lineWidth=8;
  ctx.beginPath();ctx.moveTo(x-5+ls*.3,y-2);ctx.lineTo(x-12+ls*.3,y+2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+5-ls*.3,y-2);ctx.lineTo(x+12-ls*.3,y+2);ctx.stroke();
  // Shoe shine
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x-7+ls*.3,y);ctx.lineTo(x-11+ls*.3,y+1.5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+7-ls*.3,y);ctx.lineTo(x+11-ls*.3,y+1.5);ctx.stroke();

  // Neck
  ctx.fillStyle=p.skin;ctx.fillRect(x-5,y-66,10,10);
  // Head (face oval)
  ctx.fillStyle=p.skin;
  ctx.beginPath();ctx.ellipse(x+sOff,y-78,14,17,0,0,Math.PI*2);ctx.fill();

  // ── HIJAB ──────────────────────────────
  const hx=x+sOff;
  ctx.fillStyle=p.hijab;
  // Cap part
  ctx.beginPath();ctx.ellipse(hx,y-87,16,12,0,0,Math.PI*2);ctx.fill();
  // Side drapes flowing down
  ctx.beginPath();
  ctx.moveTo(hx-15,y-85);
  ctx.quadraticCurveTo(hx-22,y-72,hx-20,y-58);
  ctx.lineTo(hx-14,y-58);
  ctx.quadraticCurveTo(hx-18,y-72,hx-12,y-85);
  ctx.closePath();ctx.fill();
  ctx.beginPath();
  ctx.moveTo(hx+15,y-85);
  ctx.quadraticCurveTo(hx+22,y-72,hx+20,y-58);
  ctx.lineTo(hx+14,y-58);
  ctx.quadraticCurveTo(hx+18,y-72,hx+12,y-85);
  ctx.closePath();ctx.fill();
  // Under-chin wrap (covers neck area)
  ctx.fillStyle=p.hijab;
  ctx.beginPath();ctx.ellipse(hx,y-66,12,8,0,0,Math.PI*2);ctx.fill();
  // Hijab shine
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.beginPath();ctx.ellipse(hx-3,y-91,7,5,.2,0,Math.PI*2);ctx.fill();
  // Hijab border detail
  ctx.strokeStyle=lc(p.hijab,40);ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(hx,y-80,14,Math.PI*.75,Math.PI*.25,true);ctx.stroke();

  // ── FACE ──
  const er=p.scared>0?4:2.6;
  ctx.fillStyle='white';
  ctx.beginPath();ctx.ellipse(hx-5,y-80,er*.7,er,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(hx+5,y-80,er*.7,er,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=p.scared>0?'#c00':'#6b21a8';
  ctx.beginPath();ctx.arc(hx-5,y-80,er*.58,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(hx-5,y-80,er*.32,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(hx+5,y-80,er*.58,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(hx+5,y-80,er*.32,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';circ(hx-4,y-82,1.2);circ(hx+6,y-82,1.2);
  // Eyelashes (girl touch)
  ctx.strokeStyle='#333';ctx.lineWidth=1.5;
  [-7,-5.5,-4,-2.5].forEach(dx=>{
    ctx.beginPath();ctx.moveTo(hx+dx,y-83.5);ctx.lineTo(hx+dx-.5,y-86);ctx.stroke();
  });
  [3.5,5,6.5,8].forEach(dx=>{
    ctx.beginPath();ctx.moveTo(hx+dx,y-83.5);ctx.lineTo(hx+dx+.5,y-86);ctx.stroke();
  });
  // Eyebrows (thin arched)
  ctx.strokeStyle='#4c1d95';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(hx-9,y-85);ctx.quadraticCurveTo(hx-5,y-88,hx-1,y-85);ctx.stroke();
  ctx.beginPath();ctx.moveTo(hx+9,y-85);ctx.quadraticCurveTo(hx+5,y-88,hx+1,y-85);ctx.stroke();
  // Mouth
  ctx.strokeStyle='#c06080';ctx.lineWidth=2;
  ctx.beginPath();
  if(p.scared>0){ctx.arc(hx,y-73,4,0,Math.PI);}
  else{ctx.arc(hx,y-74,3.5,.15,Math.PI-.15);}
  ctx.stroke();
  // Blush
  ctx.fillStyle='rgba(255,100,140,.25)';
  ctx.beginPath();ctx.ellipse(hx-9,y-75,5,3,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(hx+9,y-75,5,3,0,0,Math.PI*2);ctx.fill();

  // Name tag
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.beginPath();ctx.roundRect(hx-26,y-107,52,19,9);ctx.fill();
  ctx.fillStyle='#FF9EE0';ctx.font='bold 12px Tajawal';ctx.textAlign='center';
  ctx.fillText(p.lbl,hx,y-94);
}

// ══════════════════════════════════════════════════
//  DRAW DOG
// ══════════════════════════════════════════════════
function drawDog(d){
  const x=d.x,y=d.y,t=d.f;
  const bob=Math.abs(Math.sin(t*.38))*6;
  const ls=Math.sin(t*.50)*18;

  ctx.save();ctx.translate(0,-bob);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.15)';
  ctx.beginPath();ctx.ellipse(x+12,y+bob+4,38,8,0,0,Math.PI*2);ctx.fill();

  // Tail
  const tw=Math.sin(t*.68)*30;
  ctx.strokeStyle='#8B4513';ctx.lineWidth=7;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x-28,y-26);
  ctx.quadraticCurveTo(x-52,y-36-tw,x-48,y-58-tw);ctx.stroke();
  ctx.fillStyle='#C8A07A';circ(x-48,y-60-tw,8);

  // Back legs
  ctx.strokeStyle='#8B4513';ctx.lineWidth=11;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x-17,y-15);ctx.lineTo(x-17,y+Math.abs(ls));ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-6,y-15);ctx.lineTo(x-6,y+Math.abs(ls)*.5);ctx.stroke();
  // Back paws
  ctx.fillStyle='#6b3010';
  ctx.beginPath();ctx.ellipse(x-17,y+Math.abs(ls)+4,9,5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x-6,y+Math.abs(ls)*.5+4,9,5,0,0,Math.PI*2);ctx.fill();
  // Paw pads
  ctx.fillStyle='rgba(255,200,180,.5)';
  circ(x-17,y+Math.abs(ls)+4,3.5);circ(x-6,y+Math.abs(ls)*.5+4,3.5);

  // Body
  const bodyG=ctx.createRadialGradient(x+2,y-28,2,x+2,y-24,30);
  bodyG.addColorStop(0,'#D4803A');bodyG.addColorStop(1,'#B56020');
  ctx.fillStyle=bodyG;
  ctx.beginPath();ctx.ellipse(x+4,y-24,36,21,-.06,0,Math.PI*2);ctx.fill();
  // Belly
  ctx.fillStyle='#E8B07A';
  ctx.beginPath();ctx.ellipse(x+7,y-20,22,13,-.06,0,Math.PI*2);ctx.fill();
  // Body shine
  ctx.fillStyle='rgba(255,255,255,.13)';
  ctx.beginPath();ctx.ellipse(x-4,y-36,18,7,0,0,Math.PI*2);ctx.fill();

  // Front legs
  ctx.strokeStyle='#8B4513';ctx.lineWidth=11;
  ctx.beginPath();ctx.moveTo(x+18,y-15);ctx.lineTo(x+18,y+Math.abs(ls)*.5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+28,y-15);ctx.lineTo(x+28,y+Math.abs(ls));ctx.stroke();
  ctx.fillStyle='#6b3010';

  // Ears
  const ew=Math.sin(t*.42)*5;
  ctx.strokeStyle='#8B4513';ctx.lineWidth=14;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x+40,y-59);ctx.quadraticCurveTo(x+28,y-75+ew,x+35,y-43);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+67,y-61);ctx.quadraticCurveTo(x+80,y-77+ew,x+71,y-44);ctx.stroke();
  ctx.strokeStyle='#C08060';ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(x+41,y-57);ctx.quadraticCurveTo(x+32,y-70+ew,x+38,y-46);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+66,y-59);ctx.quadraticCurveTo(x+77,y-72+ew,x+69,y-47);ctx.stroke();

  // Eyes

  ctx.beginPath();ctx.ellipse(x+48,y-49,7,8,.1,0,Math.PI*2);ctx.fill();

function drawObs(o){
  if(o.type==='barrier'){
    // Post shadow
    ctx.fillStyle='rgba(0,0,0,.2)';
    ctx.fillRect(o.x+6,o.y-o.h+8,o.w-4,o.h);
    // Left post
    const pg=ctx.createLinearGradient(o.x,0,o.x+14,0);
    pg.addColorStop(0,'#c03800');pg.addColorStop(.5,'#e85000');pg.addColorStop(1,'#c03800');
    ctx.fillStyle=pg;
    ctx.beginPath();ctx.roundRect(o.x+2,o.y-o.h,12,o.h,[5,5,0,0]);ctx.fill();
    // Right post
    ctx.beginPath();ctx.roundRect(o.x+o.w-14,o.y-o.h,12,o.h,[5,5,0,0]);ctx.fill();
    // Post shine
    ctx.fillStyle='rgba(255,255,255,.18)';
    ctx.fillRect(o.x+4,o.y-o.h+4,4,o.h-8);
    ctx.fillRect(o.x+o.w-12,o.y-o.h+4,4,o.h-8);
    // Bar shadow
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(o.x,o.y-o.h+6,o.w,12);
    // Bar
    const bg=ctx.createLinearGradient(o.x,o.y-o.h,o.x+o.w,o.y-o.h);
    bg.addColorStop(0,'#d04200');bg.addColorStop(.3,'#ff8800');bg.addColorStop(.7,'#ff8800');bg.addColorStop(1,'#d04200');
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.roundRect(o.x,o.y-o.h,o.w,12,[5]);ctx.fill();
    // Stripes on bar
    ctx.fillStyle='#FFD700';
    for(let i=0;i<o.w;i+=20){if((i/20)%2===0)ctx.fillRect(o.x+i,o.y-o.h,10,12);}
    // Bar shine
    ctx.fillStyle='rgba(255,255,255,.3)';
    ctx.beginPath();ctx.roundRect(o.x+2,o.y-o.h+2,o.w-4,5,[3]);ctx.fill();
    // Ball tops
    const bball=(cx)=>{
      const g=ctx.createRadialGradient(cx-2,o.y-o.h-5,1,cx,o.y-o.h,9);
      g.addColorStop(0,'#fff176');g.addColorStop(1,'#cc9900');
      ctx.fillStyle=g;ctx.strokeStyle='#aa7700';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(cx,o.y-o.h,9,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.5)';circ(cx-3,o.y-o.h-4,3);
    };
    bball(o.x+8);bball(o.x+o.w-8);

  } else {
    // Crate shadow
    ctx.fillStyle='rgba(0,0,0,.2)';
    ctx.beginPath();ctx.roundRect(o.x+5,o.y-o.h+8,o.w-2,o.h,[4]);ctx.fill();
    // Crate body gradient
    const cg=ctx.createLinearGradient(o.x,o.y-o.h,o.x,o.y);
    cg.addColorStop(0,'#9B7A30');cg.addColorStop(.4,'#7B5C1A');cg.addColorStop(1,'#5a4010');
    ctx.fillStyle=cg;
    ctx.beginPath();ctx.roundRect(o.x,o.y-o.h,o.w,o.h,[5]);ctx.fill();
    // Wood frame
    ctx.strokeStyle='#4a3408';ctx.lineWidth=2.5;
    ctx.strokeRect(o.x+5,o.y-o.h+5,o.w-10,o.h-10);
    // Wood planks
    ctx.strokeStyle='#5c4010';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(o.x+5,o.y-o.h/2);ctx.lineTo(o.x+o.w-5,o.y-o.h/2);
    ctx.moveTo(o.x+o.w/2,o.y-o.h+5);ctx.lineTo(o.x+o.w/2,o.y-5);
    ctx.stroke();
    // Diagonal nails
    ctx.fillStyle='#888';[{x:o.x+9,y:o.y-o.h+9},{x:o.x+o.w-9,y:o.y-o.h+9},{x:o.x+9,y:o.y-9},{x:o.x+o.w-9,y:o.y-9}].forEach(n=>circ(n.x,n.y,2));
    // Highlight
    ctx.fillStyle='rgba(255,255,255,.1)';
    ctx.beginPath();ctx.roundRect(o.x+5,o.y-o.h+5,o.w-10,(o.h-10)/2,[4,4,0,0]);ctx.fill();
  }
}

function drawCoin(cn,t){
  const squeeze=Math.abs(Math.cos(t*.05+cn.phase));
  const x=cn.x,y=cn.y;
  // Coin shadow
  ctx.fillStyle='rgba(0,0,0,.15)';
  ctx.beginPath();ctx.ellipse(x,y+18,12,4,0,0,Math.PI*2);ctx.fill();
  // Coin body
  const cg=ctx.createRadialGradient(x-3,y-3,1,x,y,12);
  cg.addColorStop(0,'#fff176');cg.addColorStop(.6,'#FFD700');cg.addColorStop(1,'#b8860b');
  ctx.fillStyle=cg;
  ctx.beginPath();ctx.ellipse(x,y,14*squeeze+1,14,0,0,Math.PI*2);ctx.fill();
  // Coin edge
  ctx.strokeStyle='#cc9900';ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(x,y,14*squeeze+1,14,0,0,Math.PI*2);ctx.stroke();
  // ج symbol
  if(squeeze>.3){
    ctx.fillStyle='#8B6000';ctx.font=`bold ${Math.round(13*squeeze)}px Tajawal`;
    ctx.textAlign='center';ctx.fillText('ج',x,y+5);
  }
  // Shine
  ctx.fillStyle='rgba(255,255,255,.55)';
  ctx.beginPath();ctx.ellipse(x-3*squeeze,y-4,4*squeeze,3,0,0,Math.PI*2);ctx.fill();
}

//  ENVIRONMENT
// ══════════════════════════════════════════════════
function drawBg(){
  const sk=ctx.createLinearGradient(0,0,0,GY());
  sk.addColorStop(0,'#1255a8');sk.addColorStop(.5,'#3fa0e8');sk.addColorStop(1,'#b0e0f7');
  ctx.fillStyle=sk;ctx.fillRect(0,0,W(),GY());

  // Mountains
  const mtn=(cx,w,h,col)=>{
    ctx.fillStyle=col;
    ctx.beginPath();ctx.moveTo(cx-w,GY());ctx.lineTo(cx,GY()-h);ctx.lineTo(cx+w,GY());ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.42)';
    ctx.beginPath();ctx.moveTo(cx-w*.22,GY()-h*.73);ctx.lineTo(cx,GY()-h);ctx.lineTo(cx+w*.22,GY()-h*.73);ctx.closePath();ctx.fill();
    ctx.fillStyle=col;
  };
  mtn(W()*.07,110,80,'#78A8C8');mtn(W()*.28,95,62,'#88B4D0');
  mtn(W()*.53,135,92,'#6EA0C2');mtn(W()*.80,108,70,'#7AACC8');mtn(W()*1.02,90,55,'#84B0CC');

  // Sun
  const sx=W()-60,sy=50;
  ctx.fillStyle='#FFE566';ctx.shadowColor='#FFD700';ctx.shadowBlur=30;
  ctx.beginPath();ctx.arc(sx,sy,25,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,215,0,.6)';ctx.lineWidth=3;
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2+frame*.007;
    ctx.beginPath();ctx.moveTo(sx+Math.cos(a)*30,sy+Math.sin(a)*30);
    ctx.lineTo(sx+Math.cos(a)*43,sy+Math.sin(a)*43);ctx.stroke();
  }

  // Clouds
  clouds.forEach(cl=>{
    ctx.fillStyle=`rgba(255,255,255,${cl.op})`;
    ctx.beginPath();ctx.ellipse(cl.x,cl.y,cl.w,cl.h,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cl.x-cl.w*.4,cl.y+cl.h*.32,cl.w*.65,cl.h*.7,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cl.x+cl.w*.38,cl.y+cl.h*.28,cl.w*.55,cl.h*.65,0,0,Math.PI*2);ctx.fill();
  });
}

function drawGround(){
  // Dirt
  const dg=ctx.createLinearGradient(0,GY(),0,H());
  dg.addColorStop(0,'#5a3c18');dg.addColorStop(1,'#3a2508');
  ctx.fillStyle=dg;ctx.fillRect(0,GY(),W(),GZ);
  // Grass
  const gg=ctx.createLinearGradient(0,GY(),0,GY()+20);
  gg.addColorStop(0,'#58bb28');gg.addColorStop(1,'#398a10');
  ctx.fillStyle=gg;ctx.fillRect(0,GY(),W(),20);
  // Grass tufts
  ctx.fillStyle='#307a0e';
  for(let i=0;i<W()+40;i+=18){
    const bx=((i-(bgX*.4|0))%(W()+40)+W()+40)%(W()+40)-18;
    ctx.beginPath();ctx.moveTo(bx-3,GY()+2);ctx.lineTo(bx,GY()-8);ctx.lineTo(bx+3,GY()+2);ctx.fill();
    ctx.beginPath();ctx.moveTo(bx+7,GY()+2);ctx.lineTo(bx+9,GY()-6);ctx.lineTo(bx+12,GY()+2);ctx.fill();
  }
  // Ground border line
  ctx.strokeStyle='#246006';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,GY()+20);ctx.lineTo(W(),GY()+20);ctx.stroke();
  // Pebbles
  ctx.fillStyle='#8B7355';
  for(let i=0;i<W()+60;i+=48){
    const bx=((i-(bgX*.22|0))%(W()+60)+W()+60)%(W()+60)-10;
    ctx.beginPath();ctx.ellipse(bx,GY()+30,5,3,.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(bx+20,GY()+42,4,2.5,-.2,0,Math.PI*2);ctx.fill();
  }
}

function drawFloatingTexts(){
  ftexts.forEach(f=>{
    ctx.save();
    ctx.globalAlpha=f.life/f.maxLife;
    const sc=f.scale||1;
    ctx.font=`bold ${f.size||16}px Tajawal`;
    ctx.textAlign='center';
    // Outline
    ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=4;
    ctx.strokeText(f.t,f.x,f.y);
    ctx.fillStyle=f.col||'#FFD700';
    ctx.fillText(f.t,f.x,f.y);
    ctx.restore();
  });
}

// ══════════════════════════════════════════════════
//  GAME LOGIC
// ══════════════════════════════════════════════════
function init(){
  score=0;money=0;lives=3;frame=0;running=false;spd=4.8;
  obs=[];coins=[];parts=[];ftexts=[];
  bgX=0;stimer=0;nobs=160;ncoin=80;
  hcd=0;flash=0;loveTimer=300;loveMsg=0;
  clouds=[];
  for(let i=0;i<5;i++)clouds.push(mkCl(Math.random()*W()));
  chars=CDEFS.map(makeChar);
  dog=makeDog();
  updateHUD();
}

function mkCl(x){
  return{x,y:16+Math.random()*60,w:30+Math.random()*40,h:14+Math.random()*12,op:.72+Math.random()*.28,spd:.32+Math.random()*.45};
}

function updateHUD(){
  document.getElementById('sc').textContent=score;
  document.getElementById('mo').textContent=money;
  document.getElementById('hi').textContent=hiScore;
  document.getElementById('lv').textContent='❤️'.repeat(Math.max(0,lives));
}

function spawnObs(){
  const tp=Math.random()<.65?'barrier':'box';
  const h=tp==='barrier'?50+Math.random()*22:42+Math.random()*28;
  const w=tp==='barrier'?62:46;
  obs.push({x:W()+20,y:GY(),w,h,type:tp,jumped:false});
}

function spawnCoin(){
  const cx=W()+15;
  // Random height – either on ground level or floating
  const ch=Math.random()<.5?GY()-25:GY()-70-Math.random()*40;
  coins.push({x:cx,y:ch,r:14,phase:Math.random()*Math.PI*2,collected:false});
}

function checkCol(ch,o){
  return ch.x+12>o.x+5 && ch.x-12<o.x+o.w-5 && ch.y-4>o.y-o.h-4 && ch.y-76<o.y;
}

function addPart(x,y,col){
  for(let i=0;i<16;i++){
    const a=Math.random()*Math.PI*2,s=2.5+Math.random()*5;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-4,life:40,ml:40,c:col,r:3+Math.random()*4.5});
  }
}

function addText(x,y,t,col,sz,maxL){
  ftexts.push({x,y,vy:-2.2,life:maxL||45,maxLife:maxL||45,t,col:col||'#FFD700',size:sz||16});
}

function doJump(){
  chars.forEach(c=>{
    if(c.onG){
      c.vy=-15.5;c.onG=false;
      addText(c.x,c.y-90,'هوب!','#FFF176',14,35);
    }
  });
}

function update(){
  frame++;bgX+=spd*.5;stimer++;
  if(stimer>5){score++;stimer=0;}
  spd=4.8+Math.floor(score/100)*.4;
  updateHUD();

  // Clouds
  clouds.forEach(cl=>{cl.x-=cl.spd;if(cl.x<-110)cl.x=W()+90;});

  // Chars physics
  chars.forEach(c=>{
    c.vy+=.70;c.y+=c.vy;
    if(c.y>=GY()){c.y=GY();c.vy=0;c.onG=true;}
    else c.onG=false;
    if(c.scared>0)c.scared--;
    c.x=W()*c.frac;
  });

  // Obstacles
  nobs--;
  if(nobs<=0){
    spawnObs();
    const gap=Math.max(75,155-Math.floor(score/40));
    nobs=gap+Math.floor(Math.random()*80);
  }
  obs.forEach(o=>o.x-=spd);
  // Check if any char jumped OVER obstacle → "درش واحد!"
  obs.forEach(o=>{
    if(!o.jumped){
      const allOver=chars.every(c=>c.x>o.x+o.w/2);
      if(allOver){
        o.jumped=true;
        // درش واحد popup – big & colourful
        const mx=o.x+o.w/2;
        addText(mx,o.y-o.h-30,'🏅 درش واحد!','#FF4444',22,65);
        addText(mx,o.y-o.h-58,'💪','',20,55);
        addPart(mx,o.y-o.h-20,'#FFD700');
      }
    }
  });
  obs=obs.filter(o=>o.x>-200);

  // Coins
  ncoin--;
  if(ncoin<=0){spawnCoin();ncoin=60+Math.floor(Math.random()*70);}
  coins.forEach(cn=>cn.x-=spd);
  // Collect coins
  coins.forEach(cn=>{
    if(cn.collected)return;
    chars.forEach(c=>{
      if(Math.abs(c.x-cn.x)<18&&Math.abs((c.y-38)-cn.y)<28){
        cn.collected=true;money+=5;
        addText(cn.x,cn.y-20,'+5 💰','#FFD700',15,40);
        addPart(cn.x,cn.y,'#FFD700');
      }
    });
  });
  coins=coins.filter(cn=>cn.x>-100&&!cn.collected);

  // Collision with obstacles
  if(hcd>0)hcd--;
  else{
    for(const c of chars){
      for(const o of obs){
        if(checkCol(c,o)){
          lives--;hcd=90;flash=28;
          c.scared=50;addPart(c.x,c.y-40,'#FF3333');
          addText(c.x,c.y-90,'آخ!','#FF4444',18,40);
          if(lives<=0){endGame();return;}
          break;
        }
      }
    }
  }

  // Dog – stays well behind chars
  dog.f++;
  const asmaa=chars[1];
  const targetX=asmaa.x-160; // 160px behind Asmaa
  if(dog.x<targetX)dog.x+=spd*.55+.4;
  else if(dog.x>targetX+20)dog.x-=1;
  dog.y=GY();

  // Love messages from Asmaa every ~8 seconds
  loveTimer--;
  if(loveTimer<=0){
    loveTimer=420+Math.floor(Math.random()*180);
    const am=chars[1];
    addText(am.x,am.y-112,LOVE_MSGS[loveMsg%LOVE_MSGS.length],'#FF69B4',14,100);
    loveMsg++;
    addPart(am.x,am.y-100,'#FF69B4');
  }

  // Particles & floating texts
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.28;p.life--;});
  parts=parts.filter(p=>p.life>0);
  ftexts.forEach(f=>{f.y+=f.vy;f.vy*=.93;f.life--;});
  ftexts=ftexts.filter(f=>f.life>0);
  if(flash>0)flash--;
}

function draw(){
  ctx.clearRect(0,0,W(),H());
  drawBg();drawGround();

  // Coins behind characters
  coins.forEach(cn=>drawCoin(cn,frame));

  obs.forEach(drawObs);
  drawDog(dog);

  // Draw chars
  chars.forEach((c,i)=>{
    if(i===0)drawMostafa(c,frame);
    else drawAsmaa(c,frame);
  });

  // Particles
  parts.forEach(p=>{
    ctx.globalAlpha=p.life/p.ml;
    ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  drawFloatingTexts();

  // Hit flash
  if(flash>0&&Math.floor(flash/4)%2===0){
    ctx.fillStyle='rgba(255,20,20,.35)';ctx.fillRect(0,0,W(),H());
  }
}

function gameLoop(){
  if(!running)return;
  update();draw();
  requestAnimationFrame(gameLoop);
}

function startGame(){
  init();
  document.getElementById('ov').style.display='none';
  running=true;gameLoop();
}

function endGame(){
  running=false;
  if(score>hiScore)hiScore=score;
  const ov=document.getElementById('ov');
  ov.innerHTML=`
    <div class="oe" style="animation:none">😱🐕</div>
    <div class="ot">الكلب أمسكهم!</div>
    <div class="os">
      آه يا مصطفى وأسماء! 😂<br>
      نقاط: <strong style="color:#FFD700;font-size:1.4rem">${score}</strong> &nbsp;|&nbsp;
      فلوس: <strong style="color:#FFD700;font-size:1.4rem">💰${money}</strong><br>
      أعلى نقاط: <strong style="color:#FFD700">${hiScore}</strong>
    </div>
    <button class="pb" onclick="startGame()">🔄 العب تاني!</button>
    <div class="ch"><span>⬆ سهم</span><span>SPACE</span><span>👆 اضغط</span></div>
  `;
  ov.style.display='flex';
}

// ── Controls ──────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(!running)return;
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doJump();}
});
canvas.addEventListener('pointerdown',e=>{e.preventDefault();if(running)doJump();});

// Init
init();draw();
</script>
</body>
</html>
